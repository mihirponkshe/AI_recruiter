ai_usage_summary: |
  Used Claude for architecture discussion, code review, and implementation
  guidance. No candidate data was fed to any LLM during the ranking process.
  The ranker is entirely rule-based with no LLM inference at runtime.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based multi-signal ranker with 8 scoring components and a multiplicative
  behavioral modifier. Career history (product vs consulting, IR system
  experience) and text analysis (headline + summary keyword density) are the
  decisive signals; skill matching uses 100+ alias normalizations with
  proficiency × duration weighting. Honeypot detection catches ~80 fraudulent
  profiles via date-math and career-overflow checks. Education tier, salary fit,
  and platform assessments provide fine-grained differentiation. Runtime is
  ~60 seconds for 100K candidates on CPU, well within the 5-minute budget.

